name: 시가총액 일일 업데이트

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-mkcap:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests

      - name: 시가총액 수집
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: python src/fetch_mkcap.py

      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 시총 업데이트: $(date +'%Y-%m-%d')"
          git push
